pan>上傳蓄水量資料</span><input id='chartFileInput' type='file' accept='.xlsx,.xls,.xlsm'></label><p id='chartUploadStatus' class='upload-status' data-status='info'>未上傳前顯示目前已發布資料；可選擇「106-115年阿里山原水蓄水量歷線.xlsm」於瀏覽器端重繪本圖，不會上傳檔案。</p></div><div id='chart'></div></section></main><script src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js' integrity='sha256-yVBhl8r4CaB1tt7h2g02+xnacVj/6KiOewyWxdhiPJk=' crossorigin='anonymous'></script><script>window.__waterHistoryConfig={mode:'daily',divisor:1,sheetName:'115年阿里山原水蓄水量歷線資料',expectedFile:'106-115年阿里山原水蓄水量歷線.xlsm',colors:['#1d4ed8','#0ea5e9','#16a34a','#f97316','#a855f7','#64748b','#dc2626','#14b8a6','#eab308','#8b5cf6','#111827'],textColor:'#0f172a',subColor:'#475569',gridColor:'#cbd5e1',yAxisName:'蓄水量（依原表數值）'};const initialSourceUrl='https://raw.githubusercontent.com/spchuck/twc-water-charts/30b33bf5ca16a922eccb40417974216c832dafa1/charts/alishan_rawwater_storage_106_115_white.html';let chartInstance=null;async function inflatePayload(text){const bytes=Uint8Array.from(atob(text),char=>char.charCodeAt(0));if(!('DecompressionStream' in window)){throw new Error('本瀏覽器不支援資料解壓縮功能，請改用新版 Chrome 或 Edge。')}const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));return JSON.parse(await new Response(stream).text())}function extractPayload(html){const key='payloadGzipBase64';const start=html.indexOf(key);if(start<0){throw new Error('無法讀取目前已發布資料')}const eq=html.indexOf('=',start);const sq=String.fromCharCode(39);const dq=String.fromCharCode(34);const a=html.indexOf(sq,eq);const b=html.indexOf(dq,eq);const quote=(a>-1&&(b<0||a<b))?sq:dq;const first=html.indexOf(quote,eq);const end=html.indexOf(quote,first+1);return html.slice(first+1,end)}function renderWaterHistoryChart(payload,sourceLabel){const target=document.getElementById('chart');if(!chartInstance){chartInstance=echarts.init(target,null,{renderer:'canvas'})}const option={backgroundColor:'transparent',color:payload.colors,tooltip:{trigger:'axis',axisPointer:{type:'cross',label:{backgroundColor:'#0f172a'}},backgroundColor:'rgba(17,24,39,.94)',borderWidth:0,padding:10,textStyle:{fontSize:13,color:'#e5e7eb'},valueFormatter:value=>value==null?'-':Number(value).toLocaleString('zh-TW',{maximumFractionDigits:3})},legend:{top:8,right:10,type:'scroll',textStyle:{color:payload.textColor,fontSize:12},inactiveColor:payload.subColor},toolbox:{left:10,top:6,feature:{restore:{},saveAsImage:{pixelRatio:2},dataView:{readOnly:true}}},grid:{top:72,left:72,right:32,bottom:92,containLabel:true},dataZoom:[{type:'inside',filterMode:'none'},{type:'slider',bottom:28,height:24,filterMode:'none'}],xAxis:{type:'category',boundaryGap:false,name:'時間（月 / 日）',nameLocation:'middle',nameGap:42,data:payload.xLabels,axisLine:{lineStyle:{color:payload.subColor}},axisTick:{alignWithLabel:true},axisLabel:{color:payload.subColor,formatter:value=>['1/1','2/1','3/1','4/1','5/1','6/1','7/1','8/1','9/1','10/1','11/1','12/1','12/31'].includes(value)?value:''}},yAxis:{type:'value',name:payload.yAxisName,nameGap:56,axisLabel:{color:payload.subColor},splitLine:{lineStyle:{color:payload.gridColor,type:'dashed'}}},series:payload.series};chartInstance.setOption(option,true);window.__chartReady=true;window.__seriesCount=payload.series.length;window.__chartSource=sourceLabel||'目前已發布資料'}window.renderWaterHistoryChart=renderWaterHistoryChart;window.addEventListener('resize',()=>{if(chartInstance){chartInstance.resize()}});fetch(initialSourceUrl).then(response=>response.text()).then(html=>inflatePayload(extractPayload(html))).then(payload=>{window.__initialPayload=payload;renderWaterHistoryChart(payload,'目前已發布資料')}).catch(error=>{const target=document.getElementById('chart');target.textContent=error.message;target.style.display='grid';target.style.placeItems='center';target.style.color='#475569';console.error(error)})</script><script src='./chart_upload.js'></script></body></html>
