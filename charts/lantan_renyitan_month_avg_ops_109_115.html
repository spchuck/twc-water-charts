<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>蘭潭-仁義潭月平均運轉曲線（109-115年）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0b1220;
      color: rgba(255,255,255,0.92);
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      letter-spacing: 0;
    }
    .wrap {
      width: min(1400px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 20px 0 28px;
    }
    .card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      padding: 18px 18px 10px;
      box-shadow: 0 10px 24px rgba(15,23,42,0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.35;
    }
    .desc {
      margin: 0 0 12px;
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      line-height: 1.7;
    }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 12px;
    }
    .pill {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      color: rgba(255,255,255,0.72);
      font-size: 13px;
      padding: 5px 10px;
      white-space: nowrap;
    }
    #chart {
      width: 100%;
      height: 760px;
    }
    @media (max-width: 768px) {
      .wrap { width: min(100vw - 18px, 1400px); padding-top: 10px; }
      #chart { height: 560px; }
      h1 { font-size: 19px; }
      .pill { white-space: normal; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>蘭潭-仁義潭月平均運轉曲線（109-115年）</h1>
      <p class="desc">依每日合計有效蓄水量資料按月份平均後產製；空白資料不納入該月平均分母。</p>
      <div class="pills">
        <span class="pill">X 軸：月份</span>
        <span class="pill">Y 軸：月平均合計有效蓄水量（百萬立方公尺）</span>
        <span class="pill">含近 5 年平均及運轉曲線月平均</span>
      </div>
      <div id="chart"></div>
    </section>
  </main>

</body>
</html>
