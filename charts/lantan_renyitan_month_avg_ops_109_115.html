<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>蘭潭-仁義潭月平均運轉曲線（109-115年）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0b1220;
      color: rgba(255,255,255,0.92);
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      letter-spacing: 0;
    }
    .wrap {
      width: min(1400px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 20px 0 28px;
    }
    .card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      padding: 18px 18px 10px;
      box-shadow: 0 10px 24px rgba(15,23,42,0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.35;
    }
    .desc {
      margin: 0 0 12px;
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      line-height: 1.7;
    }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 12px;
    }
    .pill {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      color: rgba(255,255,255,0.72);
      font-size: 13px;
      padding: 5px 10px;
      white-space: nowrap;
    }
    #chart {
      width: 100%;
      height: 760px;
    }
    @media (max-width: 768px) {
      .wrap { width: min(100vw - 18px, 1400px); padding-top: 10px; }
      #chart { height: 560px; }
      h1 { font-size: 19px; }
      .pill { white-space: normal; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>蘭潭-仁義潭月平均運轉曲線（109-115年）</h1>
      <p class="desc">依每日合計有效蓄水量資料按月份平均後產製；空白資料不納入該月平均分母。</p>
      <div class="pills">
        <span class="pill">X 軸：月份</span>
        <span class="pill">Y 軸：月平均合計有效蓄水量（百萬立方公尺）</span>
        <span class="pill">含近 5 年平均及運轉曲線月平均</span>
      </div>
      <div id="chart"></div>
    </section>
  </main>
  <script>
    const payloadGzipBase64 = "H4sIAHs6IWoC/9VWy25TSRD9l8sGpFarq/qdHWILbLIcsbi2r4klx0a+jkiIsmCBBsRmZjPSvL4AFgiQUBCPr3ESVvwCp7rNI5FAYiQ0YeFb1bfqdvucPlXd+81wPp0v+mbjl+YCjVw3So1qLpiu9V0Wj0JrXSveOEdLQbw2eT+O4gUXXRqINxpy4BIlN0ht8bp2YE2ZLw38cFyjRIljc0M1u1fbQTctK9PRP/cR5GpsNa4aX02oJlaTqsnVkFnb9TxUJsISfbeYdLLCfjNrt7tmA6l5dfj8IuKrw2erf3+9hPTl3i0JTSezDqN+ez5fbjUby8VOh9HW/Pbm3vZgPm02xu20l1dluDm5g4+cAn+zWTdcXt+ZCpZ1jsy1udybImW/uT0ZyYR8oJpu+9ZW2096eT2eD3fgfPyTiI7aZYs/y6QpkaKos02KrA5ekdHJk8rap6CYdTAwXnuyyrKOMSjrNMekrNHZIRa1wWdstfP5xoH6TACZc08AZZ0IyINOzIqcDuwUkc4mggFDLLjgW6BjLwSAlM9P8MRZx0DCkHOn0dP5336jDQfZfgOM5HXIJCqQTQYl5IGStDMsJrmKP7KwEZITAXjHAj1DRNBSYH+aAj7/AggVNHRuRfocskooCqeitpA8JME5FoyRBLgt8FHcZQDcwpCH/gNEc0b/9qdoADGLAhyXBhBNocGVp5fydtB3LCiRWDpA4YFdkpFnW4jIrlbCGQG488+Ah/hDVS9qIOkkckC/i0UVkbNCmSR0OFBQGQi+MOBNeRcEOlSEjlgSz3QB/58ZWL/5goDwQyogasJeFqEn6X0BWDMUEFECHtQAGwphhhW/+vgS8snb3wVzxfu/7L39tNKo7be6UfMdp0GUagjaykGILU5RGDEQgZQDtI7jgEUSWeNCImLIpR84Ww4E40rI23og2FP94N3dhyevHxz9/fT4xV8/GS9JBxGIp3I4puQhjaxQOaVEyuEvBBiURhI6IpfLgrEIJYRCuR4IHbgqLbvd5RW5CmKpxc1Be5Glfa5/uFOwUNLvDL6RE0vOzcVk9I0kSpK0d3l30l+vO3D855uT3x4fP3p49Mfh6t7j1ZOX71/dv3bl2vtXD5qDD2Sq+NmgCgAA";
    async function inflatePayload(text) {
      const bytes = Uint8Array.from(atob(text), (char) => char.charCodeAt(0));
      if (!("DecompressionStream" in window)) {
        throw new Error("本瀏覽器不支援資料解壓縮功能，請改用新版 Chrome 或 Edge。");
      }
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
      return JSON.parse(await new Response(stream).text());
    }
    inflatePayload(payloadGzipBase64).then((payload) => {
      const chart = echarts.init(document.getElementById("chart"), null, { renderer: "canvas" });
      const option = {
      backgroundColor: "transparent",
      color: payload.colors,
      tooltip: {
        trigger: "axis",
        axisPointer: { type: "cross", label: { backgroundColor: "#0f172a" } },
        backgroundColor: "rgba(17,24,39,0.94)",
        borderWidth: 0,
        padding: 10,
        textStyle: { fontSize: 13, color: "#e5e7eb" },
        valueFormatter: (value) => value == null ? "-" : Number(value).toLocaleString("zh-TW", { maximumFractionDigits: 3 })
      },
      legend: {
        top: 8,
        right: 10,
        type: "scroll",
        textStyle: { color: payload.textColor, fontSize: 12 },
        inactiveColor: payload.subColor
      },
      toolbox: {
        left: 10,
        top: 6,
        feature: {
          restore: {},
          saveAsImage: { pixelRatio: 2 },
          dataView: { readOnly: true }
        }
      },
      grid: { top: 72, left: 72, right: 32, bottom: 92, containLabel: true },
      dataZoom: [
        { type: "inside", filterMode: "none" },
        { type: "slider", bottom: 28, height: 24, filterMode: "none" }
      ],
      xAxis: {
        type: "category",
        boundaryGap: false,
        name: "時間（月 / 日）",
        nameLocation: "middle",
        nameGap: 42,
        data: payload.xLabels,
        axisLine: { lineStyle: { color: payload.subColor } },
        axisTick: { alignWithLabel: true },
        axisLabel: {
          color: payload.subColor,
          formatter: (value) => /^(1\/1|2\/1|3\/1|4\/1|5\/1|6\/1|7\/1|8\/1|9\/1|10\/1|11\/1|12\/1|12\/31|[1-9]月|1[0-2]月)$/.test(value) ? value : ""
        }
      },
      yAxis: {
        type: "value",
        name: payload.yAxisName,
        nameGap: 56,
        axisLabel: { color: payload.subColor },
        splitLine: { lineStyle: { color: payload.gridColor, type: "dashed" } }
      },
      series: payload.series
      };
      chart.setOption(option);
      window.__chartReady = true;
      window.__seriesCount = payload.series.length;
      window.addEventListener("resize", () => chart.resize());
    }).catch((error) => {
      const target = document.getElementById("chart");
      target.textContent = error.message;
      target.style.display = "grid";
      target.style.placeItems = "center";
      target.style.color = "rgba(255,255,255,0.72)";
      console.error(error);
    });
  </script>
</body>
</html>
